services:
  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile.dev
    container_name: simuverse-proxy
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PROXY_PORT: "5000"
    ports:
      - "${PUERTO_BACKEND:-5000}:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/proxy/node_modules
    depends_on:
      - api-nest
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: simuverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simuverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SimuVerse2024secret}
      POSTGRES_DB: ${POSTGRES_DB:-simuverse}
    ports:
      - "${PUERTO_POSTGRES:-5433}:5432"
    volumes:
      - simuverse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simuverse}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - app-network

  api-nest:
    build:
      context: .
      dockerfile: apps/api-nest/Dockerfile.dev
    container_name: simuverse-api-nest
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: "5001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-simuverse}:${POSTGRES_PASSWORD:-SimuVerse2024secret}@postgres:5432/${POSTGRES_DB:-simuverse}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "${PUERTO_BACKEND_INTERNAL:-5002}:5001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api-nest/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: simuverse-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${PUERTO_BACKEND:-5000}/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${PUERTO_FRONTEND:-8080}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      api-nest:
        condition: service_healthy
    networks:
      - app-network

volumes:
  simuverse_pg_data:
    name: simuverse_pg_data

networks:
  app-network:
    driver: bridge
