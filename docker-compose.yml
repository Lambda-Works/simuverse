services:
  mysql:
    image: mysql:8.0
    container_name: simuverse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-SimuVerseRoot2024secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-simuverse}
      MYSQL_USER: ${MYSQL_USER:-simuverse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-SimuVerse2024secret}
    ports:
      # 3306 y 3307 del host estan ocupados por otro proyecto (wymaq) + mysql local.
      # Usamos 3309 en el host -> 3306 dentro del contenedor.
      - "${DB_PORT:-3309}:3306"
    volumes:
      - simuverse_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSimuVerseRoot2024secret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  simuverse_mysql_data:
    name: simuverse_mysql_data
