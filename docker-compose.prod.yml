services:
  mysql:
    image: mysql:8.0
    container_name: simuverse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${PUERTO_MYSQL}:3306"
    volumes:
      - simuverse_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile.prod
    container_name: simuverse-proxy
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PROXY_PORT: "5000"
    ports:
      - "${PUERTO_PROXY}:5000"
    depends_on:
      api-express:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\" || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  api-express:
    build:
      context: .
      dockerfile: apps/api-express/Dockerfile.prod
    container_name: simuverse-api-express
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${PUERTO_BACKEND}:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\" || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  api-nest:
    build:
      context: .
      dockerfile: apps/api-nest/Dockerfile.prod
    container_name: simuverse-api-nest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5001"
    ports:
      - "${PUERTO_BACKEND_NEST}:5001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: simuverse-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${PUERTO_FRONTEND}:3000"
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\" || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  simuverse_mysql_data:
    name: simuverse_mysql_data

networks:
  app-network:
    driver: bridge
