services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${PUERTO_POSTGRES:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  seed:
    build:
      context: .
      dockerfile: apps/api-nest/Dockerfile.seed
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    command: >
      sh -c "
        echo 'Running migrations...' &&
        npx prisma migrate deploy &&
        echo 'Running seed...' &&
        npx ts-node src/prisma/seed.ts &&
        echo 'Seed completed!'
      "
    networks:
      - app-network

  markitdown:
    build:
      context: .
      dockerfile: apps/markitdown/Dockerfile
    restart: unless-stopped
    ports:
      - "5003:5000"
    volumes:
      - uploads_data:/app/apps/api-nest/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  api-nest:
    build:
      context: .
      dockerfile: apps/api-nest/Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5001"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY}
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
    ports:
      - "${PUERTO_BACKEND_NEST:-5001}:5001"
    volumes:
      - uploads_data:/app/apps/api-nest/uploads
    depends_on:
      seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        restart: true
      markitdown:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\" || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${PUERTO_FRONTEND:-3000}:3000"
    depends_on:
      api-nest:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\" || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  app-network:
    driver: bridge
