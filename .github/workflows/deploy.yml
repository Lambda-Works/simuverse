name: Deploy to Hub

on:
  push:
    branches: [main, develop]

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version y crear tag (solo main)
        if: github.ref == 'refs/heads/main'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Set environment y version
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "version=${{ steps.tag.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "branch=develop" >> $GITHUB_OUTPUT
          fi

      - name: Deploy al Hub
        run: |
          curl -sSL -w "\nHTTP %{http_code}\n" -X POST "${{ secrets.HUB_URL }}/projects/${{ secrets.HUB_PROJECT_ID }}/deploy-webhook" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d "{\"environment\":\"${{ steps.vars.outputs.environment }}\",\"version\":\"${{ steps.vars.outputs.version }}\",\"branch\":\"${{ steps.vars.outputs.branch }}\"}"
